<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Bishwash Acharya</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 170, 0.1);
            margin: 0 auto 24px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .login-form label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .login-form .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        .login-form .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .login-form .btn {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--accent);
        }

        .forgot-password-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }

        .forgot-password-link:hover {
            color: var(--accent);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .reset-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .reset-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .reset-form label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .reset-form .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        .reset-form .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .reset-form .btn {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }

        .reset-info {
            padding: 16px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .reset-code {
            padding: 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--accent);
            margin: 16px 0;
            text-align: center;
            word-break: break-all;
        }

        /* Inline form message */
        .form-message {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            text-align: left;
            line-height: 1.5;
        }
        .form-message.error {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }
        .form-message.success {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .form-message-icon {
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            pointer-events: all;
            min-width: 280px;
            max-width: 380px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease;
            line-height: 1.5;
        }
        .toast.success {
            background: rgba(0, 212, 170, 0.12);
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .toast.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
        }
        .toast.info {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.5);
            color: #a5b4fc;
        }
        .toast-icon { flex-shrink: 0; margin-top: 1px; }
        .toast-text { flex: 1; }
        .toast-close {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            opacity: 0.6;
            font-size: 16px;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
        }
        .toast-close:hover { opacity: 1; }
        .toast.hiding { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(40px); }
        }

        /* Login button loading state */
        .btn[disabled] { opacity: 0.6; cursor: not-allowed; }

        /* Password toggle wrapper */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper .form-input {
            padding-right: 46px;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s ease;
        }
        .password-toggle:hover { color: var(--accent); }
        .password-toggle svg { display: block; }
    </style>
</head>
<body>
    <section class="admin-login-section">
        <div class="login-container">
            <div class="login-logo">BA</div>
            <h1 class="login-title">Admin Access</h1>
            <p class="login-subtitle">Authorized Personnel Only</p>
            
            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-message" id="login-message">
                    <span class="form-message-icon" id="login-message-icon"></span>
                    <span id="login-message-text"></span>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span>Login</span>
                </button>
                <button type="button" class="forgot-password-link" id="forgot-password-btn">
                    Forgot Password?
                </button>
            </form>
            
            <a href="/" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Portfolio
            </a>
        </div>
    </section>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgot-password-modal">
        <div class="reset-modal">
            <button class="modal-close" id="modal-close-btn">×</button>
            <h2 style="margin-bottom: 8px;">Reset Password</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 14px;">Enter your username to receive a password reset code</p>
            
            <div class="reset-form">
                <div class="form-group">
                    <label for="reset-username">Username</label>
                    <input type="text" id="reset-username" class="form-input" placeholder="Enter your username" required>
                </div>
                <button type="button" class="btn btn-primary" id="request-reset-btn">Request Reset Code</button>
            </div>
            
            <div id="reset-code-section" style="display: none; margin-top: 24px;">
                <div class="reset-info" id="reset-info-msg">
                    ✉️ Reset code sent to your email. Check your inbox and enter it below.
                </div>
                <div class="reset-form">
                    <div class="form-group">
                        <label for="reset-code-input">Reset Code</label>
                        <input type="text" id="reset-code-input" class="form-input" placeholder="Enter reset code from email" required style="text-transform: uppercase; letter-spacing: 2px; text-align: center;">
                    </div>
                    <div class="form-group">
                        <label for="reset-new-password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="reset-new-password" class="form-input" placeholder="Enter new password" required>
                            <button type="button" class="password-toggle" data-target="reset-new-password" aria-label="Toggle password visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary" id="submit-reset-btn">Reset Password</button>
                </div>
                <p style="font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 12px;">
                    Code expires in 15 minutes
                </p>
            </div>
        </div>
    </div>

    <script>
        // ── Toast notification system ──────────────────────────────────────
        function showToast(message, type = 'info', duration = 4000) {
            const icons = {
                success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
                error:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>',
                info:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="8"/></svg>'
            };
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconEl = document.createElement('span');
            iconEl.className = 'toast-icon';
            iconEl.innerHTML = icons[type] || icons.info;
            const textEl = document.createElement('span');
            textEl.className = 'toast-text';
            textEl.textContent = message;
            const closeBtn = document.createElement('button');
            closeBtn.className = 'toast-close';
            closeBtn.textContent = '×';
            closeBtn.addEventListener('click', () => dismissToast(toast));
            toast.appendChild(iconEl);
            toast.appendChild(textEl);
            toast.appendChild(closeBtn);
            container.appendChild(toast);
            if (duration > 0) {
                setTimeout(() => dismissToast(toast), duration);
            }
            return toast;
        }

        function dismissToast(toast) {
            if (!toast || toast.classList.contains('hiding')) return;
            toast.classList.add('hiding');
            setTimeout(() => toast.remove(), 300);
        }

        // ── Inline login form message ──────────────────────────────────────
        function showLoginMessage(message, type = 'error') {
            const box  = document.getElementById('login-message');
            const icon = document.getElementById('login-message-icon');
            const text = document.getElementById('login-message-text');
            const icons = {
                error:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>',
                success: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            };
            box.className = `form-message ${type}`;
            icon.innerHTML = icons[type] || '';
            text.textContent = message;
        }

        function clearLoginMessage() {
            const box = document.getElementById('login-message');
            box.className = 'form-message';
        }

        // ── Forgot password modal ──────────────────────────────────────────
        function openForgotPasswordModal() {
            document.getElementById('forgot-password-modal').classList.add('active');
            document.getElementById('reset-username').value = '';
            document.getElementById('reset-code-section').style.display = 'none';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgot-password-modal').classList.remove('active');
        }

        async function requestPasswordReset() {
            const username = document.getElementById('reset-username').value.trim();
            if (!username) {
                showToast('Please enter your username', 'error');
                return;
            }
            try {
                const res  = await fetch('/api/auth/request-password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    const masked = data.maskedEmail || 'your email';
                    document.getElementById('reset-info-msg').innerHTML =
                        `✉️ Reset code sent to <strong>${masked}</strong>. Check your inbox and enter it below.`;
                    document.getElementById('reset-code-section').style.display = 'block';
                    showToast(`Reset code sent to ${masked}`, 'success');
                    setTimeout(() => {
                        if (document.getElementById('forgot-password-modal').classList.contains('active')) {
                            closeForgotPasswordModal();
                            showToast('Reset code expired. Please request a new one.', 'info');
                        }
                    }, 15 * 60 * 1000);
                } else {
                    showToast(data.error || 'Error requesting password reset', 'error');
                }
            } catch (err) {
                showToast('Error connecting to server', 'error');
            }
        }

        async function submitPasswordReset() {
            const resetCode   = document.getElementById('reset-code-input').value.trim().toUpperCase();
            const newPassword = document.getElementById('reset-new-password').value;
            if (!resetCode || !newPassword) {
                showToast('Please enter both the reset code and a new password', 'error');
                return;
            }
            if (newPassword.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }
            try {
                const res  = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resetCode, newPassword })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showToast('Password reset successfully! You can now log in.', 'success');
                    closeForgotPasswordModal();
                } else {
                    showToast(data.error || 'Failed to reset password', 'error');
                }
            } catch (err) {
                showToast('Error connecting to server', 'error');
            }
        }

        // Wire up all modal buttons via addEventListener (CSP-safe, no onclick attributes)
        document.getElementById('forgot-password-btn').addEventListener('click', openForgotPasswordModal);
        document.getElementById('modal-close-btn').addEventListener('click', closeForgotPasswordModal);
        document.getElementById('request-reset-btn').addEventListener('click', requestPasswordReset);
        document.getElementById('submit-reset-btn').addEventListener('click', submitPasswordReset);

        // Close modal on backdrop click
        document.getElementById('forgot-password-modal').addEventListener('click', (e) => {
            if (e.target.id === 'forgot-password-modal') closeForgotPasswordModal();
        });

        // ── Login form submit ──────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearLoginMessage();
            const btn      = document.getElementById('login-btn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span>Logging in…</span>';

            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    btn.innerHTML = '<span>✓ Redirecting…</span>';
                    window.location.href = window.location.pathname.replace(/\/login\.html$/, '').replace(/\/$/, '') + '/dashboard';
                } else {
                    showLoginMessage(data.error || 'Login failed. Check your credentials.');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Login</span>';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                showLoginMessage('Cannot connect to server. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Login</span>';
            }
        });

        // Clear error message when user starts typing again
        ['username', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', clearLoginMessage);
        });

        // ── Password visibility toggle ─────────────────────────────────────
        const eyeOpen = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        const eyeOff  = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                if (!input) return;
                const showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                btn.innerHTML = showing ? eyeOpen : eyeOff;
                btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
            });
        });
    </script>
</body>
</html>
